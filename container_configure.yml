---

# creates and starts containers from container vars with host vars defaults
- name: Configure containers
  hosts: proxmox_all_lxc
  gather_facts: false

  pre_tasks:

    # Step 1: detect OS — raw needs no Python, ignore if host is offline
    - name: Detect OS
      ansible.builtin.raw: . /etc/os-release && echo "$ID $VERSION_CODENAME"
      register: os_info
      changed_when: false
      ignore_unreachable: true
      ignore_errors: true

    # Step 2a: Debian and Ubuntu 22.04+ have python3.11 in default repos
    #          Run apt-get update first to handle stale caches on fresh containers
    - name: Install Python 3.11 from default repositories
      ansible.builtin.raw: |
        apt-get update -qq 2>/dev/null || true
        DEBIAN_FRONTEND=noninteractive apt-get install -y python3.11
      become: true
      changed_when: false
      register: python_default_install
      ignore_errors: true
      when:
        - not (os_info.unreachable | default(false))
        - not (os_info.failed | default(false))

    # Step 2b: Ubuntu 20.04 — python3.11 only via deadsnakes PPA
    #          add-apt-repository -y already runs apt-get update internally
    - name: Install Python 3.11 via deadsnakes PPA (Ubuntu only, after default repos fail)
      ansible.builtin.raw: |
        add-apt-repository -y ppa:deadsnakes/ppa
        DEBIAN_FRONTEND=noninteractive apt-get install -y python3.11
      become: true
      changed_when: false
      when:
        - not (os_info.unreachable | default(false))
        - not (os_info.failed | default(false))
        - python_default_install is failed
        - "'ubuntu' in os_info.stdout"

  tasks:

    - name: Ansible Ping server
      ansible.builtin.ping:
      ignore_unreachable: true
      ignore_errors: true
      register: pingtest
      tags:
        - always

    - name: Clear host errors
      ansible.builtin.meta: clear_host_errors
      tags:
        - always

    - name: "Set ansible_user to {{ bootstrap_user }}"
      ansible.builtin.set_fact:
        ansible_user: "{{ bootstrap_user }}"
      when: pingtest.failed | default(pingtest.unreachable) | default(false)
      tags:
        - always

    - name: Install basic packages
      ansible.builtin.apt:
        pkg:
          - sudo
          - expect
          - git
          - curl
          - vim
        state: present
        update_cache: true
      become: true

    - name: Create default user
      ansible.builtin.include_role:
        name: users
      tags:
        - user

    - name: Collect facts
      ansible.builtin.setup:
      tags:
        - always

    - name: "Set ansible_user to {{ default_user }}"
      ansible.builtin.set_fact:
        ansible_user: "{{ default_user }}"
      when: pingtest.failed | default(pingtest.unreachable) | default(false)

    - name: Update ssh config
      ansible.builtin.include_role:
        name: lxc_config
      tags:
        - lxc_config

    - name: Install Docker
      ansible.builtin.include_role:
        name: docker
      when: inventory_hostname is match('.*(docker|authentik|forgejo|nextcloud|termix|paperless).*')
      tags:
        - docker

    # Hosts with exactly one role (LXC-only or single-service Docker)
    # Runs only when container.search (or container.name) is found in inventory_hostname
    - name: 'Configure/Install role based container'
      ansible.builtin.include_tasks: tasks/lxc_config.yml
      vars:
        container: '{{ lxc }}'
      loop:
        - { name: adguard, role: adguard_home, search: dns }
        - name: glance
        - name: semaphore
        - name: ntfy
        - name: caddy
        - name: uptimekuma
        - name: grafana
        - name: forgejo
        - name: authentik
        - name: termix
        - name: paperless
        - name: nextcloud
        - name: kestra
        - name: netalertx
      loop_control:
        loop_var: lxc
      tags:
        - docker.deploy

    # Hosts with multiple services — service list defined in host_vars
    - name: Deploy multi-service hosts
      ansible.builtin.include_role:
        name: '{{ service.name }}'
      when: docker_roles is defined
      loop: '{{ docker_roles | default([]) }}'
      loop_control:
        loop_var: service
      tags:
        - docker.deploy

    - name: Do OS update
      ansible.builtin.include_tasks: tasks/os_update.yml
      when:
        - '"semaphore" not in inventory_hostname'
      tags:
        - os_update
